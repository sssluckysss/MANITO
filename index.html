<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>오지민 이사님 마니또 선물 카드</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap');
        body { background-color: #fdf6ff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 40px 0; font-family: 'Gaegu', cursive; }
        @media print { body { -webkit-print-color-adjust: exact; background-color: white; padding: 0; } .no-print { display: none; } .letter-container { border: 5px dotted #5eead4 !important; box-shadow: none !important; margin: 0; width: 100%; } }
        .letter-container { width: 550px; padding: 50px 40px; background: white; border: 10px dotted #5eead4; border-radius: 50px; box-shadow: 0 15px 30px rgba(94, 234, 212, 0.2); position: relative; text-align: center; }
        .deco { position: absolute; font-size: 35px; }
        .title-main { color: #2dd4bf; font-size: 36px; margin: 0 0 40px 0; line-height: 1.2; background: linear-gradient(to top, #ccfbf1 40%, transparent 40%); display: inline-block; }
        .acrostic-section { display: flex; flex-direction: column; gap: 20px; margin: 30px 0; }
        .row { display: flex; align-items: flex-start; background: #f0fdfa; padding: 20px; border-radius: 25px; }
        .initial { background: #fbbf24; color: white; width: 45px; height: 45px; display: flex; justify-content: center; align-items: center; border-radius: 15px; font-weight: bold; font-size: 28px; margin-right: 20px; flex-shrink: 0; box-shadow: 3px 3px 0px #d97706; }
        .content-area { border: none; font-family: 'Gaegu', cursive; font-size: 24px; width: 100%; color: #334155; padding: 0; outline: none; background: transparent; resize: none; overflow: hidden; line-height: 1.4; }
        .footer-msg { margin-top: 30px; font-size: 22px; color: #64748b; border-top: 1px solid #f1f5f9; padding-top: 20px; }
        .highlight { color: #f43f5e; font-weight: bold; font-size: 26px; }
    </style>
</head>
<body>
    <div class="letter-container">
        <div class="deco" style="top: -20px; left: -20px;">🎉</div>
        <div class="deco" style="top: -20px; right: -20px;">💌</div>
        <div class="deco" style="bottom: -20px; left: -10px;">🎁</div>
        <div class="deco" style="bottom: -15px; right: -10px;">💖</div>
        <h1 class="title-main">💖오지민 이사님께 드리는 응원💖</h1>
        <div class="acrostic-section">
            <div class="row">
                <div class="initial">오</div>
                <textarea class="content-area" rows="1">오지민 이사님!</textarea>
            </div>
            <div class="row">
                <div class="initial" style="background: #38bdf8; box-shadow: 3px 3px 0px #0284c7;">지</div>
                <textarea class="content-area" id="long-text">지치지 않는 열정! 프로페셔널한 모습! 곁에서 지켜보며 항상 감탄하며 배우고 있습니다. 이사님의 마니또가 되어서 이런 마음을 전달할 수 있어 아주 기쁘네요. 지치고 힘드실때도 있으시겠지만 당신을 응원하는 누군가가 항상 있다는 것을 생각하고 힘내세요!!! 오지민 화이팅!!!!!</textarea>
            </div>
            <div class="row">
                <div class="initial" style="background: #f472b6; box-shadow: 3px 3px 0px #db2777;">민</div>
                <textarea class="content-area" rows="1">민트초코</textarea>
            </div>
        </div>
        <div class="footer-msg">- 언제나 응원하는 <span class="highlight">당신의 마니또</span></div>
        <p class="no-print" style="margin-top:20px; color:#ccc; font-size:14px;"></p>
    </div>
    <script>
        const textareas = document.querySelectorAll('.content-area');
        textareas.forEach(target => {
            target.style.height = 'auto';
            target.style.height = (target.scrollHeight) + 'px';
            target.addEventListener('input', (e) => {
                e.target.style.height = 'auto';
                e.target.style.height = (e.target.scrollHeight) + 'px';
            });
        });
    </script>
</body>
</html>
